<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Rounded badge background -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="black"/>
  
  <!-- Left ear -->
  <path d="M 80 60 Q 70 30 75 10 Q 85 20 90 50" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right ear -->
  <path d="M 120 60 Q 130 30 125 10 Q 115 20 110 50" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Head -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="white" stroke-width="8"/>
  
  <!-- Left eye -->
  <circle cx="85" cy="90" r="5" fill="white"/>
  
  <!-- Right eye (X mark) -->
  <line x1="115" y1="85" x2="125" y2="95" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="125" y1="85" x2="115" y2="95" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="100" y1="100" x2="100" y2="110" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <path d="M 100 110 Q 90 115 85 110" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Left front paw -->
  <line x1="75" y1="135" x2="70" y2="160" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right front paw -->
  <line x1="125" y1="135" x2="130" y2="160" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Back -->
  <path d="M 70 130 Q 60 140 65 160" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Tail (curved) -->
  <path d="M 140 120 Q 160 110 165 90" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>